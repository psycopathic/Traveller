name: Traveller CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.19.0
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install backend dependencies
      working-directory: backend
      run: npm ci --no-audit --no-fund
    
    - name: Run backend linter
      working-directory: backend
      run: npm run lint --if-present

    - name: Create backend .env
      working-directory: backend
      run: |
        JWT_SECRET_VALUE="${{ secrets.JWT_SECRET }}"
        if [ -z "$JWT_SECRET_VALUE" ]; then
          JWT_SECRET_VALUE="${{ secrets.jwt_secret }}"
        fi
        if [ -z "$JWT_SECRET_VALUE" ]; then
          echo "JWT secret not found in GitHub secrets. Using test fallback value."
          JWT_SECRET_VALUE="test_jwt_secret"
        fi
        {
          echo "JWT_SECRET=$JWT_SECRET_VALUE"
          echo "NODE_ENV=test"
        } > .env
    
    - name: Run backend tests
      working-directory: backend
      run: npm test
      env:
        NODE_ENV: test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.19.0
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: |
        npm ci --include=optional --no-audit --no-fund || {
          echo "Initial install failed. Retrying clean install to recover optional native bindings."
          npm cache clean --force
          rm -rf node_modules
          npm ci --include=optional --no-audit --no-fund
        }
    
    - name: Run frontend linter
      working-directory: frontend
      run: npm run lint
    
    - name: Build frontend
      working-directory: frontend
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
        retention-days: 7
        if-no-files-found: error
